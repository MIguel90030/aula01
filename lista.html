<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #2d3436; }
        .container { max-width: 900px; margin: auto; }
        
        .dashboard { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; flex: 1; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; color: #6c5ce7; font-size: 28px; }
        .stat-card p { margin: 5px 0 0; color: #636e72; font-weight: 600; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input#busca { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        input#busca:focus { border-color: #6c5ce7; }

        table { width: 100%; background: white; border-collapse: collapse; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #6c5ce7; color: white; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        
        .btn-action { cursor: pointer; border: none; background: none; font-size: 18px; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
        .btn-voltar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #6c5ce7; font-weight: bold; }
        @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
/* Isso faz as linhas da tabela aparecerem suavemente */
tr { animation: fadeInUp 0.4s ease forwards; }
/* Isso faz os cards do topo aparecerem suavemente */
.stat-card { animation: fadeInUp 0.5s ease forwards;
background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); /* Sombra suave */
    transition: all 0.3s ease;
    border: 1px solid #eee;
    flex: 1;
    min-width: 150px;
 }
 .stat-card:hover {
    transform: translateY(-5px); /* Eleva o card ao passar o mouse */
    box-shadow: 0 8px 25px rgba(108, 92, 231, 0.2); /* Sombra colorida */
    border-color: #6c5ce7;
}

.stat-card h3 {
    font-size: 2rem;
    color: #6c5ce7;
    margin-bottom: 5px;
}

.stat-card p {
    color: #636e72;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 0.8rem;
}
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px; /* Cria um espaço entre as linhas */
    margin-top: 20px;
}

/* Deixa as bordas da tabela arredondadas */
tr {
    background-color: white;
    transition: all 0.2s;
}

td {
    padding: 15px;
    border-top: 1px solid #f1f2f6;
    border-bottom: 1px solid #f1f2f6;
}

/* Arredonda os cantos das linhas */
td:first-child { border-left: 1px solid #f1f2f6; border-radius: 10px 0 0 10px; }
td:last-child { border-right: 1px solid #f1f2f6; border-radius: 0 10px 10px 0; }

tr:hover {
    background-color: #f9f9ff;
    transform: scale(1.01); /* Dá um leve zoom na linha */
}
.status-badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}
.btn-filter {
    padding: 8px 16px;
    border: 1px solid #eee;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    color: #636e72;
}

.btn-filter:hover {
    background: #f1f2f6;
}

.btn-filter.active {
    background: #6c5ce7;
    color: white;
    border-color: #6c5ce7;
}
/* No seu JS, você pode ajustar para usar essa classe se quiser algo mais avançado, 
mas o CSS acima já melhora o que você tem! */
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    
<nav style="background: #6c5ce7; padding: 15px; display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
    <a href="cadastro.html" style="color: white; text-decoration: none; font-weight: bold;">➕ Novo Cadastro</a>
    <a href="lista.html" style="color: white; text-decoration: none; font-weight: bold;">📋 Lista de Funcionários</a>
</nav>
<div class="filter-container" style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button class="btn-filter active" onclick="filtrarStatus('todos', this)">Todos</button>
    <button class="btn-filter" onclick="filtrarStatus('Ativo', this)" style="border-left: 5px solid #00b894;">Ativos</button>
    <button class="btn-filter" onclick="filtrarStatus('Férias', this)" style="border-left: 5px solid #fdcb6e;">Em Férias</button>
    <button class="btn-filter" onclick="filtrarStatus('Treinamento', this)" style="border-left: 5px solid #0984e3;">Treinamento</button>
</div>

<div class="container">
    <a href="cadastro.html" class="btn-voltar">← Novo Cadastro</a>
    
    <div class="dashboard" id="dash">
        </div>
        <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button onclick="filtrarRapido('todos')" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #6c5ce7; cursor: pointer;">Todos</button>
    <button onclick="filtrarRapido('Tecnologia (TI)')" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #6c5ce7; cursor: pointer;">TI</button>
    <button onclick="filtrarRapido('RH')" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #6c5ce7; cursor: pointer;">RH</button>
    <button onclick="filtrarRapido('Férias')" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #fdcb6e; cursor: pointer;">🌴 Em Férias</button>
</div>
        <div style="width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px;">
    <button onclick="gerarPDF()" style="background: #2d3436; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">
        📥 Baixar Relatório (PDF)
    </button>
</div>

<div style="width: 100%; display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;">
    <button onclick="exportarDados()" style="background: #00b894; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">
        📤 Exportar Backup
    </button>
    
    <label for="importarArquivo" style="background: #0984e3; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">
        📥 Importar Backup
    </label>
    <input type="file" id="importarArquivo" style="display: none;" accept=".json" onchange="importarDados(event)">
</div>

    <div class="controls">
        <input type="text" id="busca" placeholder="🔍 Pesquisar por nome ou setor..." onkeyup="renderizar()">
    </div>
    
    <table>
        <thead>
            <tr><th>Nome</th><th>Setor</th><th style="text-align: center;">Ações</th></tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
</div>
<div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; position:relative;">
        <h3>Editar Funcionário</h3>
        <input type="hidden" id="editIndex">
        <label>Nome:</label>
        <input type="text" id="editNome" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
        
        <label>Setor:</label>
        <select id="editSetor" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            <option value="Tecnologia (TI)">Tecnologia (TI)</option>
            <option value="RH">Recursos Humanos (RH)</option>
            <option value="Vendas">Vendas</option>
            <option value="Financeiro">Financeiro</option>
        </select>

        <label>Status:</label>
        <select id="editStatus" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            <option value="Ativo">Ativo</option>
            <option value="Férias">Em Férias</option>
            <option value="Treinamento">Em Treinamento</option>
        </select>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="fecharModal()" style="flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer; background:#dfe6e9;">Cancelar</button>
            <button onclick="salvarEdicao()" style="flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer; background:#6c5ce7; color:white; font-weight:bold;">Salvar</button>
        </div>
        <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; flex-direction: column; align-items: center;">
    <h4 style="margin-top: 0; color: #6c5ce7;">Distribuição por Setor</h4>
    <div style="width: 300px; height: 300px;">
        <canvas id="meuGrafico"></canvas>
    </div>
    <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 30px; max-width: 500px; margin-inline: auto;">
    <h4 style="text-align: center; color: #2d3436; margin-bottom: 15px;">Distribuição por Setor</h4>
    <canvas id="meuGrafico"></canvas>
</div>
</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // 1. Variável global do gráfico
    let chartInstancia = null;
    let statusAtual = 'todos'; // Variável global

function filtrarStatus(status, elemento) {
    statusAtual = status;
    
    // Remove a classe 'active' de todos os botões e coloca no clicado
    document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
    elemento.classList.add('active');
    
    renderizar(); // Chama a função que já temos para atualizar a tela
}

    // 2. Função para renderizar a tabela e o dashboard (VERSÃO ÚNICA E CORRIGIDA)
    function renderizar() {
        const busca = document.getElementById('busca').value.toLowerCase();
        const usuarios = JSON.parse(localStorage.getItem('usuariosCadastrados')) || [];
        const tabela = document.getElementById('tabela');
        const dash = document.getElementById('dash');
        
        // Contagem dos setores para os Cards
        const contagem = { "Tecnologia (TI)": 0, "RH": 0, "Vendas": 0, "Financeiro": 0 };
        usuarios.forEach(u => {
            if (contagem[u.setor] !== undefined) contagem[u.setor]++;
        });

        // Atualiza os Cards do Dashboard
        dash.innerHTML = Object.keys(contagem).map(s => `
            <div class="stat-card" onclick="filtrarRapido('${s}')" style="cursor:pointer;">
                <h3>${contagem[s]}</h3>
                <p>${s}</p>
            </div>
        `).join('');

        // Filtro de busca
       const filtrados = usuarios.filter(u => {
    // 1. Verifica se o nome ou setor bate com a busca digitada
    const correspondeBusca = u.nome.toLowerCase().includes(busca) || u.setor.toLowerCase().includes(busca);
    
    // 2. Verifica se o status do usuário é o que foi clicado no botão
    const correspondeStatus = statusAtual === 'todos' || u.status === statusAtual;
    
    // Só retorna o usuário se ele passar nas duas regras ao mesmo tempo!
    return correspondeBusca && correspondeStatus;
});
        // Se não houver dados
        if (filtrados.length === 0) {
            tabela.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 40px; color: #999;">Nenhum funcionário encontrado.</td></tr>';
            atualizarGrafico(); // Atualiza o gráfico mesmo vazio
            return;
        }

        // Renderização da Tabela
        tabela.innerHTML = filtrados.map((u, index) => {
            const corStatus = u.status === 'Férias' ? '#fdcb6e' : (u.status === 'Treinamento' ? '#0984e3' : '#00b894');
            
            return `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${u.nome}" 
                                 style="width: 40px; height: 40px; border-radius: 50%; background: #f0f0f0;">
                            <div>
                                <strong>${u.nome}</strong><br>
                                <small style="color: ${corStatus}; font-weight: bold;">● ${u.status || 'Ativo'}</small>
                                <small style="color: #666;">${calcularTempoCasa(u.admissao)}</small> </div>
                            </div>
                        </div>
                    </td>
                    <td><span style="background: #eee; padding: 4px 10px; border-radius: 20px; font-size: 12px;">${u.setor}</span></td>
                    <td style="text-align: center;">
                        <button class="btn-action" title="Ver Perfil" onclick="verPerfil(${index})">👁️</button>
                        <button class="btn-action" title="Editar" onclick="editar(${index})">📝</button>
                        <button class="btn-action" title="Excluir" onclick="excluir(${index})">❌</button>
                    </td>
                </tr>
            `;
        }).join('');

        // CHAMA O GRÁFICO APÓS RENDERIZAR A TABELA
        atualizarGrafico();
    }

    // 3. Função do Gráfico
    function atualizarGrafico() {
        const canvas = document.getElementById('meuGrafico');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        const usuarios = JSON.parse(localStorage.getItem('usuariosCadastrados')) || [];
        const setores = ["Tecnologia (TI)", "RH", "Vendas", "Financeiro"];
        const contagemDados = setores.map(setor => usuarios.filter(u => u.setor === setor).length);

        if (chartInstancia) {
            chartInstancia.destroy();
        }

        chartInstancia = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: setores,
                datasets: [{
                    data: contagemDados,
                    backgroundColor: ['#6c5ce7', '#00b894', '#fdcb6e', '#0984e3'],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    // --- OUTRAS FUNÇÕES DO SISTEMA ---

    function editar(index) {
        const usuarios = JSON.parse(localStorage.getItem('usuariosCadastrados'));
        const user = usuarios[index];
        document.getElementById('editIndex').value = index;
        document.getElementById('editNome').value = user.nome;
        document.getElementById('editSetor').value = user.setor;
        document.getElementById('editStatus').value = user.status || 'Ativo';
        document.getElementById('modalEditar').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }

    function salvarEdicao() {
        const index = document.getElementById('editIndex').value;
        let usuarios = JSON.parse(localStorage.getItem('usuariosCadastrados'));
        usuarios[index].nome = document.getElementById('editNome').value;
        usuarios[index].setor = document.getElementById('editSetor').value;
        usuarios[index].status = document.getElementById('editStatus').value;
        localStorage.setItem('usuariosCadastrados', JSON.stringify(usuarios));
        fecharModal();
        renderizar();
    }

    function excluir(index) {
    Swal.fire({
        title: "Tem certeza?",
        text: "Você não poderá reverter isso!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#6c5ce7",
        cancelButtonColor: "#d33",
        confirmButtonText: "Sim, excluir!",
        cancelButtonText: "Cancelar"
    }).then((result) => {
        if (result.isConfirmed) {
            let usuarios = JSON.parse(localStorage.getItem('usuariosCadastrados'));
            usuarios.splice(index, 1);
            localStorage.setItem('usuariosCadastrados', JSON.stringify(usuarios));
            renderizar();
            
            Swal.fire("Excluído!", "O funcionário foi removido.", "success");
        }
    });
}

    function filtrarRapido(termo) {
        const busca = document.getElementById('busca');
        busca.value = termo === 'todos' ? '' : termo;
        renderizar();
    }

    function verPerfil(index) {
        const usuarios = JSON.parse(localStorage.getItem('usuariosCadastrados'));
        localStorage.setItem('visualizarUsuario', JSON.stringify(usuarios[index]));
        window.location.href = 'perfil.html';
    }

    function exportarDados() {
        const dados = localStorage.getItem('usuariosCadastrados');
        if (!dados) return alert("Não há dados!");
        const blob = new Blob([dados], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `backup_funcionarios.json`;
        link.click();
    }

    function gerarPDF() {
        window.print();
    }

    // Inicializa a página
    renderizar();
    function calcularTempoCasa(dataAdmissao) {
    if (!dataAdmissao) return "Data não informada";
    
    const hoje = new Date();
    const admissao = new Date(dataAdmissao);
    
    let anos = hoje.getFullYear() - admissao.getFullYear();
    let meses = hoje.getMonth() - admissao.getMonth();

    if (meses < 0 || (meses === 0 && hoje.getDate() < admissao.getDate())) {
        anos--;
        meses += 12;
    }

    if (anos > 0) {
        return `Há ${anos} ano${anos > 1 ? 's' : ''}${meses > 0 ? ` e ${meses} mes${meses > 1 ? 'es' : ''}` : ''}`;
    } else {
        return `Há ${meses} mes${meses > 1 ? 'es' : ''}`;
    }
}
</script>

</body>
</html>
