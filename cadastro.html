<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro - Setores</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-cadastro {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; color: var(--secondary-color); margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--primary-color); }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: #357abd; }

        #mensagem { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card-cadastro">
    <h2>Cadastro de Funcionário</h2>
    <form id="meuFormulario">
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="form-group">
            <label>E-mail Corporativo</label>
            <input type="email" id="email" placeholder="seuemail@empresa.com" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label>Setor</label>
            <select id="setor" required>
                <option value="">Selecione um setor...</option>
                <option value="ti">Tecnologia (TI)</option>
                <option value="rh">Recursos Humanos</option>
                <option value="vendas">Vendas</option>
                <option value="financeiro">Financeiro</option>
            </select>
        </div>

        <button type="submit">Finalizar Cadastro</button>
    </form>
    <div id="mensagem"></div>
</div>

<script>
    document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const dados = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value,
            setor: document.getElementById('setor').value
        };

        const msgDiv = document.getElementById('mensagem');
        msgDiv.innerText = "Enviando para o servidor Python...";
        msgDiv.style.color = "blue";

        // Aqui é onde o JS conversa com o Python (API)
        console.log("Dados prontos para o Python:", dados);
        
        /* Exemplo de como seria a chamada para o Python:
        const response = await fetch('http://localhost:5000/api/cadastro', {
            method: 'POST',
            body: JSON.stringify(dados)
        });
        */
    });
</script>

</body>
</html>
