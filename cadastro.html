<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Gestão</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f9f9fc; --card: #ffffff; --text: #2d3436; --border: #dfe6e9; }
        .dark-mode { --bg: #1e1e2e; --card: #2b2b3b; --text: #f8f8f2; --border: #44475a; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: 0.3s; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; position: relative; text-align: center; }
        
        .theme-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; border: none; background: none; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 2px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        
        .strength-bar { height: 6px; width: 0%; border-radius: 10px; transition: 0.5s; margin-bottom: 15px; }
        .weak { width: 33%; background: #ff7675; }
        .medium { width: 66%; background: #fdcb6e; }
        .strong { width: 100%; background: #00b894; }

        .btn-cadastrar { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-cadastrar:hover { background: #5a4bcf; transform: translateY(-2px); }
        .link-lista { display: block; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>


  <nav style="background: #6c5ce7; padding: 15px; display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
    <a href="cadastro.html" style="color: white; text-decoration: none; font-weight: bold;">➕ Novo Cadastro</a>
    <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">📋 Lista de Funcionários</a>
    <a href="#" onclick="logout()" style="color: #ff7675; text-decoration: none; font-weight: bold;">❌ Sair</a>
</nav>

<div class="container" id="conteudo">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <h2 style="margin-bottom: 10px;">Criar Conta</h2>
    <p style="color: #b2bec3; font-size: 14px; margin-bottom: 20px;">Preencha os dados do funcionário.</p>
    
<form id="formCadastro">
    <input type="text" id="nome" placeholder="Nome Completo" required>
    <input type="email" id="email" placeholder="E-mail Corporativo" required>
    <input type="text" id="cargo" placeholder="Cargo (Ex: Desenvolvedor, Analista)" required>
    
    <input type="text" id="cpf" placeholder="CPF" maxlength="14" required oninput="mascaraCPF(this)">
    
    <input type="text" id="telefone" placeholder="Telefone / WhatsApp" maxlength="15" required oninput="mascaraTelefone(this)">
    ```
    
    <input type="password" id="senha" placeholder="Senha (Mín. 6 caracteres)" required oninput="checkSenha(this.value)">
    <div id="barra" class="strength-bar"></div>
    <div class="input-group">
    <label>Data de Admissão</label>
    <input type="date" id="dataAdmissao" required>
</div>
    
    <select id="setor" required>
        <option value="" disabled selected>Selecione o Setor</option>
        <option value="Tecnologia (TI)">Tecnologia (TI)</option>
        <option value="RH">Recursos Humanos (RH)</option>
        <option value="Vendas">Vendas</option>
        <option value="Financeiro">Financeiro</option>
    </select>

    <select id="status" required>
        <option value="Ativo">Ativo</option>
        <option value="Férias">Em Férias</option>
        <option value="Treinamento">Em Treinamento</option>
    </select>

    <button type="submit" class="btn-cadastrar">Finalizar Cadastro</button>
</form>
<script>
    window.onload = () => {
    // Verificação de segurança:
    if (localStorage.getItem('logado') !== 'true') {
        window.location.href = 'login.html';
        return; // O 'return' impede que o resto da página carregue se ele não estiver logado
    }

    // --- O resto do seu código window.onload continua aqui embaixo normal ---
    // (ex: renderizar(), checar dark mode, etc...)
}
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('tema', isDark ? 'dark' : 'light');
    }

    function checkSenha(senha) {
        const barra = document.getElementById('barra');
        if (!barra) return;
        barra.className = "strength-bar"; 
        
        if (senha.length === 0) {
            barra.style.width = "0%";
        } else if (senha.length < 6) {
            barra.classList.add('weak');
        } else if (senha.length < 10) {
            barra.classList.add('medium');
        } else {
            barra.classList.add('strong');
        }
    }

    window.onload = () => {
        if (localStorage.getItem('tema') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    }

    // AQUI ESTAVA O ERRO: A função de salvar o formulário
    document.getElementById('formCadastro').addEventListener('submit', (e) => {
        e.preventDefault();

        // Capturando todos os dados, INCLUINDO A ADMISSÃO
        const user = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            cargo: document.getElementById('cargo').value,       // <-- NOVO
            cpf: document.getElementById('cpf').value,           // <-- NOVO
            telefone: document.getElementById('telefone').value, // <-- NOVO
            setor: document.getElementById('setor').value,
            status: document.getElementById('status').value,
            admissao: document.getElementById('dataAdmissao').value, // <-- ESTA LINHA SALVA A DATA
            id: Date.now()
        };

        // Salva no LocalStorage
        const lista = JSON.parse(localStorage.getItem('usuariosCadastrados')) || [];
        lista.push(user);
        localStorage.setItem('usuariosCadastrados', JSON.stringify(lista));
        
        // Feedback visual de sucesso
        document.getElementById('conteudo').innerHTML = `
            <div style="animation: fadeIn 0.5s ease; padding: 20px; text-align:center;">
                <div style="font-size: 60px; color: #00b894;">✓</div>
                <h3>Sucesso!</h3>
                <p>Funcionário cadastrado com sucesso.</p>
                <p>Redirecionando para a lista...</p>
            </div>
        `;

        // Usa o SweetAlert se você já tiver o link no Head, senão o código acima já resolve
        if (typeof Swal !== 'undefined') {
            Swal.fire({
                title: "Sucesso!",
                text: "Funcionário cadastrado!",
                icon: "success",
                timer: 1500,
                showConfirmButton: false
            });
        }

        setTimeout(() => window.location.href = 'index.html', 1500);
    });
function logout() {
    localStorage.removeItem('logado');
    window.location.href = 'index.html'; // Aqui pode ser index porque você está saindo do cadastro
}
function mascaraCPF(campo) {
        let v = campo.value.replace(/\D/g, ""); // Remove tudo o que não é dígito
        v = v.replace(/(\d{3})(\d)/, "$1.$2"); // Coloca o primeiro ponto
        v = v.replace(/(\d{3})(\d)/, "$1.$2"); // Coloca o segundo ponto
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2"); // Coloca o traço
        campo.value = v;
    }

    function mascaraTelefone(campo) {
        let v = campo.value.replace(/\D/g, ""); // Remove o que não é dígito
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2"); // Coloca parênteses no DDD
        v = v.replace(/(\d)(\d{4})$/, "$1-$2"); // Coloca o traço no meio
        campo.value = v;
    }
</script>
</body>
</html>
