<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Funcionário</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .profile-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; position: relative; }
        
        .avatar-grande { width: 150px; height: 150px; border-radius: 50%; background: #eee; margin-bottom: 20px; border: 5px solid var(--primary); }
        
        .badge-status { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 20px; }
        
        .info-group { text-align: left; background: #f9f9fc; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .info-group label { display: block; font-size: 12px; color: #636e72; text-transform: uppercase; font-weight: bold; }
        .info-group span { font-size: 18px; font-weight: 500; }

        .btn-voltar { display: block; margin-top: 25px; text-decoration: none; color: var(--primary); font-weight: bold; transition: 0.3s; }
        .btn-voltar:hover { opacity: 0.7; }
    </style>
</head>
<body>

<div class="profile-card" id="cardPerfil">
    </div>

<script>
    window.onload = () => {
        const usuario = JSON.parse(localStorage.getItem('visualizarUsuario'));

        if (!usuario) {
            document.body.innerHTML = "<h1>Funcionário não encontrado!</h1><a href='lista.html'>Voltar</a>";
            return;
        }
        if (localStorage.getItem('tema') === 'dark') {
    document.body.classList.add('dark-mode');
}

        const corStatus = usuario.status === 'Férias' ? '#fdcb6e' : (usuario.status === 'Treinamento' ? '#0984e3' : '#00b894');

        document.getElementById('cardPerfil').innerHTML = `
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${usuario.nome}" class="avatar-grande">
            
            <div class="badge-status" style="background: ${corStatus}22; color: ${corStatus}">
                ● ${usuario.status || 'Ativo'}
            </div>

            <h2 style="margin: 0 0 5px 0;">${usuario.nome}</h2>
            <p style="color: #636e72; margin-bottom: 30px;">ID do Colaborador: #${usuario.id.toString().slice(-6)}</p>

            <div class="info-group">
                <label>E-mail Corporativo</label>
                <span>${usuario.email}</span>
            </div>

            <div class="info-group">
                <label>Setor / Departamento</label>
                <span>${usuario.setor}</span>
            </div>

            <div class="info-group">
                <label>Data de Registro</label>
                <span>${new Date(usuario.id).toLocaleDateString()}</span>
            </div>

            <a href="index.html" class="btn-voltar">← Voltar para a Lista</a>
        `;
    };
</script>

</body>
</html>
